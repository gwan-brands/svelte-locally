version: 2
updates:
  # Root package
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    ignore:
      # Ignore patch updates (security still flagged)
      - dependency-name: "*"
        update-types: ["version-update:semver-patch"]
    groups:
      # Group all dev dependencies together
      dev-deps:
        dependency-type: "development"
        update-types: ["minor", "major"]

  # Examples package
  - package-ecosystem: "npm"
    directory: "/examples"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 2
    ignore:
      # Ignore SvelteKit ecosystem - update manually
      - dependency-name: "@sveltejs/*"
      - dependency-name: "svelte"
      - dependency-name: "vite"
      # Ignore patches
      - dependency-name: "*"
        update-types: ["version-update:semver-patch"]
